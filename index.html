<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Next Door</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F3EE;
      --warm-white: #FDFAF6;
      --forest: #2D5016;
      --forest-light: #3D6B20;
      --terracotta: #C4622D;
      --terracotta-light: #E8845A;
      --sage: #7A9E5F;
      --sage-light: #A8C490;
      --text-dark: #1C1C1C;
      --text-mid: #4A4A4A;
      --text-light: #787878;
      --border: #E2DAD0;
      --gold: #D4A843;
      --error: #C0392B;
      --success: #27AE60;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
    }

    h1, h2, h3, h4 { font-family: 'Fraunces', serif; }

    /* NAV */
    nav {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Fraunces', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--forest);
      cursor: pointer;
    }

    .nav-logo svg { color: var(--terracotta); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .nav-link:hover { color: var(--forest); }
    .nav-link.active { color: var(--forest); border-bottom-color: var(--forest); }

    .nav-auth {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-ghost {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-mid);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--forest); color: var(--forest); }

    .btn-primary {
      background: var(--forest);
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--forest-light); }

    .btn-terracotta {
      background: var(--terracotta);
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-terracotta:hover { background: var(--terracotta-light); transform: translateY(-1px); }

    .btn-outline-forest {
      background: transparent;
      border: 2px solid var(--forest);
      border-radius: 10px;
      padding: 13px 28px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--forest);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline-forest:hover { background: var(--forest); color: white; }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px 6px 8px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-mid);
    }

    .avatar {
      width: 28px;
      height: 28px;
      background: var(--sage);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
    }

    /* HERO */
    .hero {
      background: var(--warm-white);
      padding: 80px 2rem 70px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(122,158,95,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(196,98,45,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .hero-eyebrow {
      display: inline-block;
      background: rgba(196,98,45,0.1);
      color: var(--terracotta);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.15;
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--sage);
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-mid);
      max-width: 480px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .hero-cta {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* BROWSE PAGE */
    .browse-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 2rem;
    }

    .browse-header {
      margin-bottom: 32px;
    }

    .browse-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .browse-header p {
      color: var(--text-light);
      font-size: 0.95rem;
    }

    .browse-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      align-items: flex-end;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-mid);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .control-group input,
    .control-group select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      background: white;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .control-group input:focus,
    .control-group select:focus { border-color: var(--sage); }

    .zip-group {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .btn-find {
      background: var(--sage);
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-find:hover { background: var(--forest); }

    /* MEAL GRID */
    .meals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .meal-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .meal-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.09); }
    .meal-card.claimed-card { opacity: 0.75; }

    .meal-img-wrap {
      position: relative;
      height: 200px;
      overflow: hidden;
      background: var(--cream);
    }

    .meal-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .meal-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0ebe3, #e8dfd4);
      font-size: 3.5rem;
    }

    .portions-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(45,80,22,0.9);
      color: white;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(4px);
    }

    .claimed-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--sage);
      color: white;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .contribution-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(212,168,67,0.92);
      color: #3a2800;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .meal-body {
      padding: 18px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .meal-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .meal-title {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
    }

    .meal-cook {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    .meal-cook span { color: var(--terracotta); font-weight: 600; }

    .meal-desc {
      font-size: 0.88rem;
      color: var(--text-mid);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meal-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .meal-meta-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.83rem;
      color: var(--text-mid);
    }

    .meal-meta-row svg { color: var(--sage); flex-shrink: 0; }

    .allergen-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }

    .allergen-tag {
      background: #FEF3E8;
      color: #8B4513;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .payment-notice {
      background: #F0F7EB;
      border: 1px solid #C5DEB0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: var(--forest);
      line-height: 1.4;
    }

    .meal-footer {
      padding: 0 20px 18px;
    }

    .btn-claim {
      width: 100%;
      background: var(--forest);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-claim:hover { background: var(--forest-light); }
    .btn-claim:disabled { background: #ccc; cursor: not-allowed; }

    /* SHARE MEAL FORM */
    .form-page {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 2rem;
    }

    .form-page h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .form-page .subtitle {
      color: var(--text-light);
      margin-bottom: 32px;
    }

    .privacy-notice {
      background: #EBF4FF;
      border: 1px solid #BDD6F5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.85rem;
      color: #1A5276;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-card {
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 20px;
    }

    .form-section-title {
      font-family: 'Fraunces', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .form-field:last-child { margin-bottom: 0; }

    .form-field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-mid);
    }

    .form-field label .req { color: var(--terracotta); }

    .form-field input,
    .form-field textarea,
    .form-field select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text-dark);
      background: var(--warm-white);
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-field input:focus,
    .form-field textarea:focus,
    .form-field select:focus { border-color: var(--sage); background: white; }

    .form-field textarea { resize: vertical; min-height: 90px; }

    .form-hint {
      font-size: 0.78rem;
      color: var(--text-light);
    }

    /* ALLERGENS */
    .allergen-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 4px;
    }

    .allergen-check {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.83rem;
      font-weight: 500;
    }

    .allergen-check:hover { border-color: var(--sage); }
    .allergen-check.checked { border-color: var(--sage); background: #EFF6E8; color: var(--forest); }

    .allergen-check input { display: none; }

    .allergen-emoji { font-size: 1rem; }

    /* PHOTO UPLOAD */
    .photo-upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--warm-white);
      position: relative;
    }

    .photo-upload-area:hover { border-color: var(--sage); background: #F5FAF0; }

    .photo-upload-area input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .photo-preview {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 8px;
    }

    /* CONTRIBUTION NOTICE */
    .contribution-notice {
      background: #FFFBEB;
      border: 1.5px solid #F5C842;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.85rem;
      color: #7A5C00;
      line-height: 1.5;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    /* SUBMIT BTN */
    .btn-submit {
      width: 100%;
      background: var(--forest);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover { background: var(--forest-light); transform: translateY(-1px); }

    /* GRATITUDE WALL */
    .gratitude-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 2rem;
    }

    .gratitude-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .gratitude-icon {
      width: 60px;
      height: 60px;
      background: rgba(196,98,45,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.6rem;
    }

    .gratitude-header h2 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .gratitude-header p {
      color: var(--text-light);
      max-width: 440px;
      margin: 0 auto 28px;
      line-height: 1.6;
    }

    .btn-gratitude {
      background: var(--forest);
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-gratitude:hover { background: var(--forest-light); }

    .gratitude-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .gratitude-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border);
      position: relative;
      transition: transform 0.2s;
    }

    .gratitude-card:hover { transform: translateY(-2px); }

    .gratitude-quote {
      font-size: 2rem;
      color: var(--border);
      font-family: 'Fraunces', serif;
      line-height: 1;
      margin-bottom: 8px;
    }

    .gratitude-msg {
      font-size: 0.95rem;
      color: var(--text-dark);
      line-height: 1.6;
      margin-bottom: 16px;
      font-style: italic;
    }

    .gratitude-footer {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .gratitude-names { font-size: 0.82rem; color: var(--text-mid); }
    .gratitude-names strong { color: var(--forest); }
    .gratitude-time { font-size: 0.78rem; color: var(--text-light); }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      backdrop-filter: blur(3px);
    }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.5rem;
      margin-bottom: 6px;
    }

    .modal .subtitle {
      color: var(--text-light);
      font-size: 0.88rem;
      margin-bottom: 24px;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--cream);
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover { background: var(--border); }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .tab {
      background: none;
      border: none;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-light);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .tab.active { color: var(--forest); border-bottom-color: var(--forest); }

    /* CLAIM MODAL SPECIFIC */
    .claim-meal-preview {
      background: var(--cream);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .claim-meal-preview h4 {
      font-family: 'Fraunces', serif;
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .claim-meal-preview p { font-size: 0.85rem; color: var(--text-mid); }

    /* SUCCESS */
    .success-box {
      background: #EFF8F1;
      border: 1.5px solid #A8D5B5;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .success-box h4 {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      color: var(--forest);
      margin-bottom: 8px;
    }

    .success-box p { font-size: 0.88rem; color: var(--text-mid); line-height: 1.5; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 80px 2rem;
      color: var(--text-light);
    }

    .empty-state-icon { font-size: 3rem; margin-bottom: 16px; }

    .empty-state h3 {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      color: var(--text-mid);
      margin-bottom: 8px;
    }

    .section-divider {
      border: none;
      border-top: 2px dashed var(--border);
      margin: 32px 0;
    }

    .section-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 16px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text-dark);
      color: white;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 999;
      animation: slideUp 0.3s ease;
      max-width: 320px;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .allergen-grid { grid-template-columns: repeat(2, 1fr); }
      nav { padding: 0 1rem; }
      .nav-links { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ALLERGENS = [
      { id: 'milk', label: 'Milk', emoji: '🥛' },
      { id: 'eggs', label: 'Eggs', emoji: '🥚' },
      { id: 'fish', label: 'Fish', emoji: '🐟' },
      { id: 'shellfish', label: 'Shellfish', emoji: '🦐' },
      { id: 'tree_nuts', label: 'Tree Nuts', emoji: '🌰' },
      { id: 'peanuts', label: 'Peanuts', emoji: '🥜' },
      { id: 'wheat', label: 'Wheat', emoji: '🌾' },
      { id: 'soybeans', label: 'Soybeans', emoji: '🫘' },
      { id: 'sesame', label: 'Sesame', emoji: '🫙' },
    ];

    // --- Helpers ---
    const storage = {
      get: (k) => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    const getUser = () => { try { return JSON.parse(localStorage.getItem('knd_user')); } catch { return null; } };
    const setUser = (u) => localStorage.setItem('knd_user', JSON.stringify(u));
    const clearUser = () => localStorage.removeItem('knd_user');

    const getMeals = () => storage.get('knd_meals');
    const saveMeals = (m) => storage.set('knd_meals', m);
    const getClaims = () => storage.get('knd_claims');
    const saveClaims = (c) => storage.set('knd_claims', c);
    const getGratitudes = () => storage.get('knd_gratitudes');
    const saveGratitudes = (g) => storage.set('knd_gratitudes', g);

    const timeAgo = (ts) => {
      const d = Math.floor((Date.now() - ts) / 1000);
      if (d < 60) return 'just now';
      if (d < 3600) return `${Math.floor(d/60)}m ago`;
      if (d < 86400) return `${Math.floor(d/3600)}h ago`;
      return `${Math.floor(d/86400)}d ago`;
    };

    const initials = (name) => name ? name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2) : '?';

    // --- ICONS (inline SVG) ---
    const Icon = ({ name, size = 16 }) => {
      const icons = {
        heart: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
        clock: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
        pin: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
        user: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        users: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
        chef: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>,
        check: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>,
        x: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        upload: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
        info: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
        arrow: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
        msg: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
        dollar: <svg width={size} height={size} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
      };
      return icons[name] || null;
    };

    // ============ AUTH MODAL ============
    function AuthModal({ onClose, onLogin }) {
      const [tab, setTab] = useState('login');
      const [form, setForm] = useState({ name:'', email:'', password:'', phone:'', zip:'' });
      const [error, setError] = useState('');

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleLogin = () => {
        const users = storage.get('knd_users');
        const user = users.find(u => u.email === form.email && u.password === form.password);
        if (!user) { setError('Invalid email or password.'); return; }
        setUser(user);
        onLogin(user);
        onClose();
      };

      const handleSignup = () => {
        if (!form.name || !form.email || !form.password || !form.phone || !form.zip) {
          setError('Please fill in all fields.'); return;
        }
        const users = storage.get('knd_users');
        if (users.find(u => u.email === form.email)) {
          setError('An account with this email already exists.'); return;
        }
        const newUser = { ...form, id: Date.now().toString(), created: Date.now() };
        storage.set('knd_users', [...users, newUser]);
        setUser(newUser);
        onLogin(newUser);
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}><Icon name="x" /></button>
            <h3>Welcome to Kitchen Next Door</h3>
            <p className="subtitle">Join your neighborhood table</p>
            <div className="tabs">
              <button className={`tab ${tab==='login'?'active':''}`} onClick={()=>{setTab('login');setError('');}}>Log In</button>
              <button className={`tab ${tab==='signup'?'active':''}`} onClick={()=>{setTab('signup');setError('');}}>Create Account</button>
            </div>
            {tab === 'signup' && (
              <div className="form-field">
                <label>Full Name <span className="req">*</span></label>
                <input placeholder="Your name" value={form.name} onChange={e=>set('name',e.target.value)} />
              </div>
            )}
            <div className="form-field">
              <label>Email <span className="req">*</span></label>
              <input type="email" placeholder="you@example.com" value={form.email} onChange={e=>set('email',e.target.value)} />
            </div>
            <div className="form-field">
              <label>Password <span className="req">*</span></label>
              <input type="password" placeholder="Password" value={form.password} onChange={e=>set('password',e.target.value)} />
            </div>
            {tab === 'signup' && <>
              <div className="form-row">
                <div className="form-field">
                  <label>Phone <span className="req">*</span></label>
                  <input placeholder="555-1234" value={form.phone} onChange={e=>set('phone',e.target.value)} />
                </div>
                <div className="form-field">
                  <label>Home ZIP <span className="req">*</span></label>
                  <input placeholder="94040" maxLength={5} value={form.zip} onChange={e=>set('zip',e.target.value)} />
                </div>
              </div>
            </>}
            {error && <p style={{color:'var(--error)',fontSize:'0.85rem',marginBottom:'12px'}}>{error}</p>}
            <button className="btn-submit" onClick={tab==='login'?handleLogin:handleSignup}>
              {tab === 'login' ? 'Log In' : 'Create Account'} <Icon name="arrow" size={18} />
            </button>
          </div>
        </div>
      );
    }

    // ============ CLAIM MODAL ============
    function ClaimModal({ meal, currentUser, onClose, onClaimed }) {
      const [form, setForm] = useState({
        name: currentUser?.name || '',
        email: currentUser?.email || '',
        phone: currentUser?.phone || '',
        portions: 1,
        note: '',
      });
      const [success, setSuccess] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const claims = getClaims().filter(c => c.mealId === meal.id);
      const totalClaimed = claims.reduce((s, c) => s + c.portions, 0);
      const remaining = meal.portions - totalClaimed;

      const handleClaim = () => {
        if (form.portions > remaining) return;
        const claim = {
          id: Date.now().toString(),
          mealId: meal.id,
          claimerName: form.name,
          claimerEmail: form.email,
          claimerPhone: form.phone,
          portions: parseInt(form.portions),
          note: form.note,
          ts: Date.now(),
        };
        const all = getClaims();
        saveClaims([...all, claim]);

        // Schedule gratitude prompt (simulated)
        const gratPromptTime = new Date(meal.pickupDate + ' ' + meal.pickupEnd);
        gratPromptTime.setHours(gratPromptTime.getHours() + 1);
        console.log(`[KND] Gratitude email to ${form.email} scheduled for ${gratPromptTime.toISOString()}`);
        console.log(`[KND] Cook notification sent to ${meal.cookEmail}: ${form.name} (${form.phone} / ${form.email}) claimed ${form.portions} portion(s) of "${meal.dishName}".`);

        setSuccess(true);
        onClaimed();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}><Icon name="x" /></button>
            <h3>Claim a Portion</h3>
            <p className="subtitle">Once claimed, both of you will receive each other's contact info.</p>

            <div className="claim-meal-preview">
              <h4>{meal.dishName}</h4>
              <p>Cooked by {meal.cookName} · {remaining} of {meal.portions} portion{meal.portions > 1 ? 's' : ''} left</p>
              {meal.pickupDate && <p style={{marginTop:4}}>📅 {meal.pickupDate} · ⏰ {meal.pickupStart} – {meal.pickupEnd}</p>}
            </div>

            {success ? (
              <div className="success-box">
                <div style={{fontSize:'2rem',marginBottom:8}}>🎉</div>
                <h4>You're all set!</h4>
                <p>
                  <strong>{meal.cookName}</strong> has been notified and will reach out to confirm pickup.<br /><br />
                  Cook contact: <strong>{meal.cookEmail}</strong> · <strong>{meal.cookPhone}</strong><br />
                  Pickup: <strong>{meal.pickupAddress}, {meal.pickupZip}</strong>
                </p>
                <p style={{marginTop:12, color:'var(--sage)', fontWeight:600}}>
                  💛 You'll receive an email 1 hour after pickup to share your gratitude!
                </p>
              </div>
            ) : (
              <>
                <div className="form-field">
                  <label>Your Name <span className="req">*</span></label>
                  <input value={form.name} onChange={e=>set('name',e.target.value)} />
                </div>
                <div className="form-row">
                  <div className="form-field">
                    <label>Email <span className="req">*</span></label>
                    <input type="email" value={form.email} onChange={e=>set('email',e.target.value)} />
                  </div>
                  <div className="form-field">
                    <label>Phone <span className="req">*</span></label>
                    <input value={form.phone} onChange={e=>set('phone',e.target.value)} />
                  </div>
                </div>
                <div className="form-field">
                  <label>Portions requested (max {remaining})</label>
                  <select value={form.portions} onChange={e=>set('portions',e.target.value)}>
                    {Array.from({length: remaining}, (_,i) => i+1).map(n => (
                      <option key={n} value={n}>{n}</option>
                    ))}
                  </select>
                </div>
                <div className="form-field">
                  <label>Note to cook <span style={{color:'var(--text-light)'}}>(optional)</span></label>
                  <textarea placeholder="Any dietary needs, or just a friendly hello!" rows={2} value={form.note} onChange={e=>set('note',e.target.value)} />
                </div>

                {meal.contribution && (
                  <div className="contribution-notice" style={{marginBottom:16}}>
                    <span>💛</span>
                    <div>
                      <strong>Suggested contribution: ${meal.contribution}</strong><br />
                      Contributions are optional and handled directly between neighbors via Venmo, Zelle, or PayPal. No payments are processed on this platform.
                    </div>
                  </div>
                )}

                <button className="btn-submit" onClick={handleClaim}>
                  Confirm Claim <Icon name="check" size={18} />
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ============ GRATITUDE MODAL ============
    function GratitudeModal({ meals, currentUser, onClose, onPosted }) {
      const [mealId, setMealId] = useState('');
      const [msg, setMsg] = useState('');
      const [success, setSuccess] = useState(false);

      const myMeals = meals.filter(m => {
        const claims = getClaims().filter(c => c.mealId === m.id && c.claimerEmail === currentUser?.email);
        return claims.length > 0;
      });

      const handlePost = () => {
        if (!mealId || !msg.trim()) return;
        const meal = meals.find(m => m.id === mealId);
        const g = {
          id: Date.now().toString(),
          mealId,
          cookName: meal.cookName,
          cookEmail: meal.cookEmail,
          reviewerName: currentUser?.name || 'A neighbor',
          message: msg,
          ts: Date.now(),
        };
        saveGratitudes([...getGratitudes(), g]);
        console.log(`[KND] Gratitude copy sent to cook ${meal.cookEmail}: "${msg}" — from ${g.reviewerName}`);
        setSuccess(true);
        onPosted();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={onClose}><Icon name="x" /></button>
            <h3>Leave a Thank You Note</h3>
            <p className="subtitle">Your note will appear publicly and be shared with the cook.</p>

            {success ? (
              <div className="success-box">
                <div style={{fontSize:'2rem',marginBottom:8}}>💛</div>
                <h4>Thank you for spreading warmth!</h4>
                <p>Your gratitude note has been posted and the cook has received a copy.</p>
              </div>
            ) : (
              <>
                <div className="form-field">
                  <label>Which meal are you grateful for? <span className="req">*</span></label>
                  <select value={mealId} onChange={e=>setMealId(e.target.value)}>
                    <option value="">Select a meal...</option>
                    {myMeals.map(m => <option key={m.id} value={m.id}>{m.dishName} by {m.cookName}</option>)}
                    {myMeals.length === 0 && <option value="any" disabled>Claim a meal first to leave gratitude</option>}
                  </select>
                </div>
                <div className="form-field">
                  <label>Your message <span className="req">*</span></label>
                  <textarea
                    placeholder="The sourdough was absolutely amazing! Thank you for sharing with the neighborhood..."
                    rows={4}
                    value={msg}
                    onChange={e=>setMsg(e.target.value)}
                  />
                </div>
                <button className="btn-submit" onClick={handlePost}>
                  Post Thank You <Icon name="heart" size={18} />
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ============ MEAL CARD ============
    function MealCard({ meal, onClaim, currentUser }) {
      const claims = getClaims().filter(c => c.mealId === meal.id);
      const totalClaimed = claims.reduce((s, c) => s + c.portions, 0);
      const remaining = meal.portions - totalClaimed;
      const isFull = remaining <= 0;

      return (
        <div className={`meal-card ${isFull ? 'claimed-card' : ''}`}>
          <div className="meal-img-wrap">
            {meal.photoUrl
              ? <img src={meal.photoUrl} alt={meal.dishName} />
              : <div className="meal-img-placeholder">🍲</div>
            }
            {isFull
              ? <span className="claimed-badge">✓ CLAIMED</span>
              : <span className="portions-badge"><Icon name="users" size={12} /> {remaining} portion{remaining !== 1 ? 's' : ''} left</span>
            }
            {meal.contribution && (
              <span className="contribution-badge">💛 ${meal.contribution} suggested</span>
            )}
          </div>

          <div className="meal-body">
            <div>
              <div className="meal-title">{meal.dishName}</div>
              <div className="meal-cook">Cooked by <span>{meal.cookName}</span> · {timeAgo(meal.ts)}</div>
            </div>
            <p className="meal-desc">{meal.description}</p>
            <div className="meal-meta">
              {meal.pickupDate && (
                <div className="meal-meta-row">
                  <Icon name="clock" size={14} />
                  {meal.pickupDate} · {meal.pickupStart} – {meal.pickupEnd}
                </div>
              )}
              <div className="meal-meta-row">
                <Icon name="pin" size={14} />
                Pickup near {meal.pickupZip}
              </div>
            </div>
            {meal.allergens && meal.allergens.length > 0 && (
              <div className="allergen-tags">
                {meal.allergens.map(a => {
                  const info = ALLERGENS.find(al => al.id === a);
                  return <span key={a} className="allergen-tag">{info?.emoji} {info?.label}</span>;
                })}
              </div>
            )}
            {meal.contribution && (
              <div className="payment-notice">
                💛 Contributions optional · handled directly via Venmo/Zelle/PayPal · no payments on this platform
              </div>
            )}
          </div>

          <div className="meal-footer">
            <button
              className="btn-claim"
              disabled={isFull}
              onClick={() => {
                if (!currentUser) { onClaim(null); return; }
                onClaim(meal);
              }}
            >
              {isFull ? '✓ Fully Claimed' : <><Icon name="heart" size={16} /> Claim Portion</>}
            </button>
          </div>
        </div>
      );
    }

    // ============ SHARE A MEAL PAGE ============
    function ShareMealPage({ currentUser, onRequireAuth }) {
      const [form, setForm] = useState({
        dishName: '', description: '', portions: 1,
        contribution: '', pickupAddress: '', pickupZip: currentUser?.zip || '',
        pickupDate: '', pickupStart: '', pickupEnd: '',
        cookName: currentUser?.name || '',
        cookEmail: currentUser?.email || '',
        cookPhone: currentUser?.phone || '',
        allergens: [], otherAllergens: '', photoUrl: '',
      });
      const [photoPreview, setPhotoPreview] = useState(null);
      const [submitted, setSubmitted] = useState(false);
      const fileRef = useRef();

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const toggleAllergen = (id) => {
        setForm(f => ({
          ...f,
          allergens: f.allergens.includes(id) ? f.allergens.filter(a => a !== id) : [...f.allergens, id]
        }));
      };

      const handlePhoto = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          setPhotoPreview(ev.target.result);
          set('photoUrl', ev.target.result);
        };
        reader.readAsDataURL(file);
      };

      const handleSubmit = () => {
        if (!currentUser) { onRequireAuth(); return; }
        if (!form.dishName || !form.pickupDate || !form.pickupStart || !form.pickupEnd) {
          alert('Please fill in dish name and pickup date/times.'); return;
        }
        const meal = {
          ...form,
          id: Date.now().toString(),
          ts: Date.now(),
          cookId: currentUser.id,
        };
        saveMeals([...getMeals(), meal]);
        setSubmitted(true);
      };

      if (submitted) return (
        <div className="form-page">
          <div className="success-box" style={{marginTop:40}}>
            <div style={{fontSize:'3rem',marginBottom:12}}>🍽️</div>
            <h4 style={{fontSize:'1.5rem'}}>Your meal is live!</h4>
            <p>Neighbors near {form.pickupZip} can now see and claim it. You'll receive an email when someone claims a portion.</p>
            <button className="btn-submit" style={{marginTop:20}} onClick={() => setSubmitted(false)}>Post Another Meal</button>
          </div>
        </div>
      );

      return (
        <div className="form-page">
          <h2>Share your table</h2>
          <p className="subtitle">Cooked a bit too much? Fill out the details so a neighbor can come pick it up.</p>

          <div className="privacy-notice">
            <Icon name="info" size={18} />
            Your contact info will only be shared with the person who claims the meal.
          </div>

          {/* What's cooking */}
          <div className="form-card">
            <div className="form-section-title"><Icon name="chef" size={18} /> What's cooking?</div>

            <div className="form-field">
              <label>Dish Name <span className="req">*</span></label>
              <input placeholder="e.g. Vegetarian Lasagna" value={form.dishName} onChange={e=>set('dishName',e.target.value)} />
            </div>

            <div className="form-field">
              <label>Photo <span style={{color:'var(--text-light)'}}>(optional)</span></label>
              <div className="photo-upload-area" onClick={() => fileRef.current.click()}>
                <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" onChange={handlePhoto} style={{display:'none'}} />
                {photoPreview
                  ? <img src={photoPreview} alt="preview" className="photo-preview" />
                  : <>
                      <div style={{fontSize:'2rem',marginBottom:8}}><Icon name="upload" size={32} /></div>
                      <p style={{fontWeight:600,color:'var(--text-mid)'}}>Click to upload photo</p>
                      <p style={{fontSize:'0.8rem',color:'var(--text-light)',marginTop:4}}>JPEG or PNG · max 10MB</p>
                    </>
                }
              </div>
            </div>

            <div className="form-field">
              <label>Description</label>
              <textarea
                placeholder="Tell neighbors what's in it — the story behind the dish, key ingredients, spice level..."
                value={form.description}
                onChange={e=>set('description',e.target.value)}
              />
            </div>

            {/* ALLERGENS */}
            <div className="form-field">
              <label>Allergens <span style={{color:'var(--text-light)'}}>(check all that apply)</span></label>
              <div className="allergen-grid">
                {ALLERGENS.map(a => (
                  <label key={a.id} className={`allergen-check ${form.allergens.includes(a.id) ? 'checked' : ''}`}>
                    <input type="checkbox" checked={form.allergens.includes(a.id)} onChange={() => toggleAllergen(a.id)} />
                    <span className="allergen-emoji">{a.emoji}</span>
                    {a.label}
                    {form.allergens.includes(a.id) && <Icon name="check" size={13} />}
                  </label>
                ))}
              </div>
            </div>

            <div className="form-field">
              <label>Other allergens or dietary notes</label>
              <input placeholder="e.g. Contains garlic, very spicy" value={form.otherAllergens} onChange={e=>set('otherAllergens',e.target.value)} />
            </div>

            <div className="form-row">
              <div className="form-field">
                <label>Portions available <span className="req">*</span></label>
                <select value={form.portions} onChange={e=>set('portions',parseInt(e.target.value))}>
                  <option value={1}>1 portion</option>
                  <option value={2}>2 portions</option>
                  <option value={3}>3 portions</option>
                </select>
                <span className="form-hint">Keep it to a few portions for safety.</span>
              </div>
              <div className="form-field">
                <label>Suggested contribution <span style={{color:'var(--text-light)'}}>(optional)</span></label>
                <input type="number" min={0} placeholder="e.g. 8" value={form.contribution} onChange={e=>set('contribution',e.target.value)} />
                <span className="form-hint">Leave blank if sharing freely.</span>
              </div>
            </div>

            {form.contribution && (
              <div className="contribution-notice">
                <span>💛</span>
                <div style={{fontSize:'0.8rem'}}>
                  Contributions are optional and handled directly between neighbors via Venmo, Zelle, or PayPal.
                  <strong> No payments are processed on this platform.</strong>
                </div>
              </div>
            )}
          </div>

          {/* PICKUP */}
          <div className="form-card">
            <div className="form-section-title"><Icon name="pin" size={18} /> Pickup Details</div>

            <div className="form-field">
              <label>General address or cross streets <span className="req">*</span></label>
              <input placeholder="e.g. Main St & Oak Ave, or 123 Elm St" value={form.pickupAddress} onChange={e=>set('pickupAddress',e.target.value)} />
            </div>

            <div className="form-row">
              <div className="form-field">
                <label>ZIP code <span className="req">*</span></label>
                <input placeholder="94040" maxLength={5} value={form.pickupZip} onChange={e=>set('pickupZip',e.target.value)} />
              </div>
              <div className="form-field">
                <label>Pickup date <span className="req">*</span></label>
                <input type="date" value={form.pickupDate} onChange={e=>set('pickupDate',e.target.value)} min={new Date().toISOString().split('T')[0]} />
              </div>
            </div>

            <div className="form-row">
              <div className="form-field">
                <label>Pickup start time <span className="req">*</span></label>
                <input type="time" value={form.pickupStart} onChange={e=>set('pickupStart',e.target.value)} />
              </div>
              <div className="form-field">
                <label>Pickup end time <span className="req">*</span></label>
                <input type="time" value={form.pickupEnd} onChange={e=>set('pickupEnd',e.target.value)} />
              </div>
            </div>
          </div>

          {/* ABOUT YOU */}
          <div className="form-card">
            <div className="form-section-title"><Icon name="user" size={18} /> About You</div>

            <div className="form-field">
              <label>Your name <span className="req">*</span></label>
              <input placeholder="Chef John" value={form.cookName} onChange={e=>set('cookName',e.target.value)} />
            </div>
            <div className="form-row">
              <div className="form-field">
                <label>Email <span className="req">*</span></label>
                <input type="email" placeholder="john@example.com" value={form.cookEmail} onChange={e=>set('cookEmail',e.target.value)} />
              </div>
              <div className="form-field">
                <label>Phone <span className="req">*</span></label>
                <input placeholder="555-9876" value={form.cookPhone} onChange={e=>set('cookPhone',e.target.value)} />
              </div>
            </div>

            <div className="privacy-notice" style={{margin:'12px 0 0'}}>
              <Icon name="info" size={16} />
              <span style={{fontSize:'0.8rem'}}>
                Food shared through Kitchen Next Door is prepared in home kitchens not inspected by public health authorities.
                This is a neighbor-to-neighbor sharing initiative, not a food business. Neighbors accept food voluntarily.
              </span>
            </div>
          </div>

          <button className="btn-submit" onClick={handleSubmit}>
            Post Meal for Neighbors <Icon name="arrow" size={18} />
          </button>
        </div>
      );
    }

    // ============ BROWSE PAGE ============
    function BrowsePage({ currentUser, onRequireAuth }) {
      const [meals, setMeals] = useState([]);
      const [claims, setClaims] = useState([]);
      const [claimMeal, setClaimMeal] = useState(null);
      const [filterZip, setFilterZip] = useState('');
      const [activeZip, setActiveZip] = useState('');
      const [sortBy, setSortBy] = useState('newest');
      const [toast, setToast] = useState('');

      const reload = () => {
        setMeals(getMeals());
        setClaims(getClaims());
      };

      useEffect(() => { reload(); }, []);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

      const handleClaim = (meal) => {
        if (!meal) { onRequireAuth(); return; }
        setClaimMeal(meal);
      };

      const totalClaimed = (meal) => {
        return getClaims().filter(c => c.mealId === meal.id).reduce((s,c) => s + c.portions, 0);
      };

      let displayed = [...meals];

      if (activeZip) {
        displayed = displayed.filter(m => m.pickupZip === activeZip);
        if (displayed.length === 0) {
          // show nearby (same first 3 digits)
          displayed = meals.filter(m => m.pickupZip?.slice(0,3) === activeZip.slice(0,3));
        }
      }

      displayed.sort((a, b) => {
        if (sortBy === 'newest') return b.ts - a.ts;
        if (sortBy === 'pickup') return new Date(a.pickupDate) - new Date(b.pickupDate);
        return 0;
      });

      // available first, claimed last
      const available = displayed.filter(m => totalClaimed(m) < m.portions);
      const full = displayed.filter(m => totalClaimed(m) >= m.portions);
      const sorted = [...available, ...full];

      return (
        <div className="browse-container">
          {/* HERO */}
          <div className="hero" style={{borderRadius:20,marginBottom:40,padding:'60px 2rem 50px'}}>
            <span className="hero-eyebrow">🏠 Hyperlocal · Homemade · Free or Pay-it-forward</span>
            <h1>Good food is meant<br />to be <em>shared.</em></h1>
            <p>Connect with neighbors through home-cooked meals. Have extra portions? Share them. Need a warm dinner? Claim one nearby.</p>
            <div className="hero-cta">
              <button className="btn-terracotta" onClick={() => window.dispatchEvent(new CustomEvent('navigate', { detail: 'share' }))}>
                <Icon name="chef" size={18} /> Share a Meal
              </button>
              <button className="btn-outline-forest">See what's cooking ↓</button>
            </div>
          </div>

          <div className="browse-header">
            <h2>Available Nearby</h2>
            <p>Fresh portions waiting to be claimed in your neighborhood.</p>
          </div>

          <div className="browse-controls">
            <div className="control-group">
              <label>Find meals near ZIP</label>
              <div className="zip-group">
                <input
                  placeholder="Enter ZIP code"
                  maxLength={5}
                  value={filterZip}
                  onChange={e => setFilterZip(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && setActiveZip(filterZip)}
                  style={{width:140}}
                />
                <button className="btn-find" onClick={() => setActiveZip(filterZip)}>Find Nearby</button>
                {activeZip && <button className="btn-find" style={{background:'var(--text-light)'}} onClick={() => { setActiveZip(''); setFilterZip(''); }}>Clear</button>}
              </div>
            </div>
            <div className="control-group">
              <label>Sort by</label>
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{width:160}}>
                <option value="newest">Newest first</option>
                <option value="pickup">Pickup date</option>
              </select>
            </div>
          </div>

          {sorted.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">🍽️</div>
              <h3>{activeZip ? `No meals near ${activeZip} yet` : 'No meals posted yet'}</h3>
              <p>{activeZip ? 'Try a nearby ZIP or check back later.' : 'Be the first to share a meal with your neighborhood!'}</p>
            </div>
          ) : (
            <>
              {available.length > 0 && full.length > 0 && (
                <p className="section-label">Available Now ({available.length})</p>
              )}
              <div className="meals-grid">
                {sorted.map(m => (
                  <MealCard key={m.id} meal={m} onClaim={handleClaim} currentUser={currentUser} />
                ))}
              </div>
            </>
          )}

          {claimMeal && (
            <ClaimModal
              meal={claimMeal}
              currentUser={currentUser}
              onClose={() => setClaimMeal(null)}
              onClaimed={() => { reload(); showToast('Portion claimed! Check your email for details.'); setTimeout(() => setClaimMeal(null), 3000); }}
            />
          )}

          {toast && <div className="toast">✓ {toast}</div>}
        </div>
      );
    }

    // ============ GRATITUDE WALL ============
    function GratitudeWall({ meals, currentUser, onRequireAuth }) {
      const [gratitudes, setGratitudes] = useState([]);
      const [showModal, setShowModal] = useState(false);

      useEffect(() => { setGratitudes(getGratitudes()); }, []);

      return (
        <div className="gratitude-container">
          <div className="gratitude-header">
            <div className="gratitude-icon">💌</div>
            <h2>The Gratitude Wall</h2>
            <p>A public space to say thank you to the wonderful neighbors who have shared their tables and their time.</p>
            <button className="btn-gratitude" onClick={() => { if (!currentUser) { onRequireAuth(); return; } setShowModal(true); }}>
              <Icon name="heart" size={16} /> Leave a Thank You Note
            </button>
          </div>

          {gratitudes.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state-icon">💛</div>
              <h3>No notes yet</h3>
              <p>Be the first to thank a neighbor for their kindness.</p>
            </div>
          ) : (
            <div className="gratitude-grid">
              {[...gratitudes].reverse().map(g => (
                <div key={g.id} className="gratitude-card">
                  <div className="gratitude-quote">"</div>
                  <p className="gratitude-msg">{g.message}</p>
                  <div className="gratitude-footer">
                    <div className="gratitude-names">
                      To: <strong>{g.cookName}</strong><br />
                      From: {g.reviewerName}
                    </div>
                    <span className="gratitude-time">{timeAgo(g.ts)}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {showModal && (
            <GratitudeModal
              meals={meals}
              currentUser={currentUser}
              onClose={() => setShowModal(false)}
              onPosted={() => { setGratitudes(getGratitudes()); setTimeout(() => setShowModal(false), 2500); }}
            />
          )}
        </div>
      );
    }

    // ============ APP ROOT ============
    function App() {
      const [page, setPage] = useState('browse');
      const [currentUser, setCurrentUser] = useState(getUser());
      const [showAuth, setShowAuth] = useState(false);
      const [meals, setMeals] = useState(getMeals());

      useEffect(() => {
        const handler = (e) => setPage(e.detail);
        window.addEventListener('navigate', handler);
        return () => window.removeEventListener('navigate', handler);
      }, []);

      useEffect(() => { setMeals(getMeals()); }, [page]);

      const handleRequireAuth = () => setShowAuth(true);

      const handleLogout = () => { clearUser(); setCurrentUser(null); };

      return (
        <>
          <nav>
            <div className="nav-logo" onClick={() => setPage('browse')}>
              <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" style={{color:'var(--terracotta)'}}>
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
              Kitchen Next Door
            </div>
            <div className="nav-links">
              <button className={`nav-link ${page==='browse'?'active':''}`} onClick={() => setPage('browse')}>Browse Meals</button>
              <button className={`nav-link ${page==='share'?'active':''}`} onClick={() => { if (!currentUser) { setShowAuth(true); } else { setPage('share'); } }}>Share a Meal</button>
              <button className={`nav-link ${page==='gratitude'?'active':''}`} onClick={() => setPage('gratitude')}>Gratitude Wall</button>
            </div>
            <div className="nav-auth">
              {currentUser ? (
                <>
                  <div className="user-badge">
                    <div className="avatar">{initials(currentUser.name)}</div>
                    {currentUser.name.split(' ')[0]}
                  </div>
                  <button className="btn-ghost" onClick={handleLogout}>Log out</button>
                </>
              ) : (
                <>
                  <button className="btn-ghost" onClick={() => setShowAuth(true)}>Log in</button>
                  <button className="btn-primary" onClick={() => setShowAuth(true)}>Sign up</button>
                </>
              )}
            </div>
          </nav>

          {page === 'browse' && <BrowsePage currentUser={currentUser} onRequireAuth={handleRequireAuth} />}
          {page === 'share' && <ShareMealPage currentUser={currentUser} onRequireAuth={handleRequireAuth} />}
          {page === 'gratitude' && <GratitudeWall meals={meals} currentUser={currentUser} onRequireAuth={handleRequireAuth} />}

          {showAuth && (
            <AuthModal
              onClose={() => setShowAuth(false)}
              onLogin={(user) => { setCurrentUser(user); }}
            />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
