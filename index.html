g you\'d be happy to share.'},{q:'What is the Gratitude Wall?',a:'The Gratitude Wall is where the community comes alive. After a pickup, you\'re invited to leave a short public thank you note for your cook. It\'s a small gesture that means a lot — a reminder that behind every dish is a neighbor who took the time to share something made with care. Keep it warm, keep it kind.'},{q:'What if something goes wrong?',a:<><p>We're a small community and we'd like to keep it that way — which means most things can be handled with a little grace and a direct conversation.</p><ul><li><em>The food doesn't seem right.</em> Trust your instincts. If something looks, smells, or tastes off, don't eat it. No hard feelings, no need for drama.</li><li><em>Someone doesn't show up.</em> It happens. If a claimant doesn't come by, the cook is free to re-post or pass the meal along as they see fit. If a cook cancels, claimants will need to make other plans — we appreciate a heads up as early as possible either way.</li><li><em>An interaction feels uncomfortable.</em> You're never obligated to complete a pickup if something feels off. Your safety comes first, always.</li></ul><p style={{marginTop:10}}>Kitchen Next Door is built on trust. The vast majority of interactions here are warm, generous, and exactly what this community is meant to be. If you have a serious concern, you can reach us through the contact form on this page.</p></>}];const submitContact=async()=>{if(!cf.name||!cf.email||!cf.message){setCfError('Please fill in all fields.');return;}setCfLoading(true);setCfError('');await sendEmail('contact_form',{name:cf.name,email:cf.email,message:cf.message});setCfLoading(false);setCfSent(true);};return(<div className="hiw-container"><div className="hiw-section"><h2>What is Kitchen Next Door?</h2><p>Kitchen Next Door is a hyper-local food sharing platform where neighbors share home-cooked meals with each other — no restaurant, no middleman, just real food made with love and a little extra to spare.</p><p>There's something about home-cooked food that just hits different. You know what's in it, you can taste the care, and every kitchen tells a different story. A recipe carried across generations, a grandmother's spice blend you won't find on any menu, a dish that opens a window into a culture you'd never have discovered otherwise. Food has always been how people find each other. Kitchen Next Door just makes it a little easier.</p></div><hr className="hiw-divider"/><div className="hiw-section"><h2>How it Works</h2><div className="hiw-steps"><div className="hiw-step-group"><h3>🍳 If you have extra to share</h3><div className="hiw-step"><div className="hiw-step-num">1</div><p>Post your dish — what it is, how many portions, when and where to pick up</p></div><div className="hiw-step"><div className="hiw-step-num">2</div><p>A neighbor claims it and reaches out directly</p></div><div className="hiw-step"><div className="hiw-step-num">3</div><p>They come by, you hand it over, and maybe you've made a new friend</p></div></div><div className="hiw-step-group"><h3>🥘 If you're looking for something homemade</h3><div className="hiw-step"><div className="hiw-step-num">1</div><p>Browse what's available near your ZIP code</p></div><div className="hiw-step"><div className="hiw-step-num">2</div><p>Claim a portion — the cook's contact details appear right away</p></div><div className="hiw-step"><div className="hiw-step-num">3</div><p>Coordinate pickup directly, no apps, no delivery fees, no waiting</p></div></div></div><div className="hiw-tagline">No subscriptions, no algorithms, no middlemen. Just neighbors feeding neighbors.</div></div><hr className="hiw-divider"/><div className="hiw-section"><h2>Our Values</h2><p>We believe food is more than fuel. It's culture, comfort, generosity, and connection — all on one plate.</p><div className="values-list"><div className="value-item"><strong>Generosity over transaction.</strong><p>This is a community, not a marketplace.</p></div><div className="value-item"><strong>Trust over rules.</strong><p>This platform runs on the goodwill of neighbors. We ask everyone to show up with honesty and good intentions.</p></div><div className="value-item"><strong>Inclusion over exclusivity.</strong><p>Every kitchen is welcome here — regardless of how simple or elaborate the meal. A pot of dal is as celebrated as a slow-braised short rib.</p></div><div className="value-item"><strong>Community over convenience.</strong><p>This isn't delivery. It's an invitation to slow down, connect, and remember that the people next door are worth knowing.</p></div></div></div><hr className="hiw-divider"/><div className="hiw-section"><h2>Do's & Don'ts</h2><div className="dos-donts"><div className="dos"><h3>✓ Do's</h3><ul><li>Post meals you'd happily serve to a guest in your home</li><li>Be accurate about allergens and ingredients — someone's health depends on it</li><li>Show up for your pickup when you've claimed a portion</li><li>Communicate directly and kindly if plans change</li><li>Leave a thank you note on the Gratitude Wall — it means more than you think</li><li>Honor a suggested contribution in the spirit it was offered</li></ul></div><div className="donts"><h3>✗ Don'ts</h3><ul><li>Don't post meals that have been sitting out, reheated multiple times, or that you wouldn't eat yourself</li><li>Don't claim a portion unless you genuinely intend to pick it up</li><li>Don't haggle over a suggested contribution — if it doesn't work for you, simply don't claim it</li><li>Don't share anyone's contact details outside of this platform</li><li>Don't use Kitchen Next Door to sell food commercially — this is neighbor to neighbor, not a business</li></ul></div></div></div><hr className="hiw-divider"/><div className="hiw-section"><h2>Frequently Asked Questions</h2><div className="faq-list">{faqs.map((f,i)=><div key={i} className="faq-item" onClick={()=>setOpenFaq(openFaq===i?null:i)}><div className="faq-q">{f.q}<Icon name="chevron" size={18}/></div>{openFaq===i&&<div className="faq-a">{f.a}</div>}</div>)}</div></div><hr className="hiw-divider"/><div className="hiw-section"><h2>Get in Touch</h2><div className="contact-form">{cfSent?(<div className="success-box"><div style={{fontSize:'2rem',marginBottom:8}}>💛</div><h4>Message received!</h4><p>We'll get back to you as soon as we can.</p></div>):(<><p>Have a question or concern? We'd love to hear from you.</p><div className="form-field"><label>Name <span className="req">*</span></label><input placeholder="Your name" value={cf.name} onChange={e=>setCf(p=>({...p,name:e.target.value}))}/></div><div className="form-field"><label>Email <span className="req">*</span></label><input type="email" placeholder="you@example.com" value={cf.email} onChange={e=>setCf(p=>({...p,email:e.target.value}))}/></div><div className="form-field"><label>Message <span className="req">*</span></label><textarea rows={4} placeholder="What's on your mind?" value={cf.message} onChange={e=>setCf(p=>({...p,message:e.target.value}))}/></div>{cfError&&<p className="error-msg">{cfError}</p>}<button className="btn-submit" disabled={cfLoading} onClick={submitContact}>{cfLoading?'Sending...':<><Icon name="arrow" size={18}/> Send Message</>}</button></>)}</div></div></div>);}
  function ShareMealPage({currentUser,onRequireAuth}){const blank={dish_name:'',description:'',portions:1,contribution:'',pickup_address:'',pickup_zip:currentUser?.home_zip||'',pickup_date:'',pickup_start:'',pickup_end:'',cook_name:currentUser?.full_name||'',cook_email:currentUser?.email||'',cook_phone:currentUser?.phone||'',allergens:[],other_allergens:'',photo_url:''};const[form,setForm]=useState(blank);const[preview,setPreview]=useState(null);const[submitted,setSubmitted]=useState(false);const[loading,setLoading]=useState(false);const[error,setError]=useState('');const fileRef=useRef();const s=(k,v)=>setForm(f=>({...f,[k]:v}));const toggleA=(id)=>setForm(f=>({...f,allergens:f.allergens.includes(id)?f.allergens.filter(a=>a!==id):[...f.allergens,id]}));const handlePhoto=(e)=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{setPreview(ev.target.result);s('photo_url',ev.target.result);};r.readAsDataURL(file);};const submit=async()=>{if(!currentUser){onRequireAuth();return;}if(!form.dish_name||!form.pickup_date||!form.pickup_start||!form.pickup_end||!form.pickup_zip){setError('Please fill in dish name, pickup date, times, and ZIP code.');return;}setLoading(true);setError('');const{error:e}=await sb.from('meals').insert({cook_id:currentUser.id,cook_name:form.cook_name,cook_email:form.cook_email,cook_phone:form.cook_phone,dish_name:form.dish_name,description:form.description,photo_url:form.photo_url||null,portions:parseInt(form.portions),portions_claimed:0,contribution:form.contribution||null,pickup_address:form.pickup_address,pickup_zip:form.pickup_zip,pickup_date:form.pickup_date,pickup_start:form.pickup_start,pickup_end:form.pickup_end,allergens:form.allergens,other_allergens:form.other_allergens||null,status:'AVAILABLE'});setLoading(false);if(e){setError(e.message);return;}setSubmitted(true);};if(submitted)return(<div className="form-page"><div className="success-box" style={{marginTop:40}}><div style={{fontSize:'3rem',marginBottom:12}}>🍽️</div><h4 style={{fontSize:'1.5rem'}}>Your meal is live!</h4><p>Neighbors near {form.pickup_zip} can now see and claim it. You'll be contacted directly when someone claims a portion.</p><button className="btn-submit" style={{marginTop:20}} onClick={()=>{setSubmitted(false);setForm(blank);setPreview(null);}}>Post Another Meal</button></div></div>);return(<div className="form-page"><h2>Share your table</h2><p className="subtitle">Cooked a bit too much? Fill out the details so a neighbor can come pick it up.</p><div className="privacy-notice"><Icon name="info" size={18}/>Your contact info will only be shared with the person who claims the meal.</div><div className="form-card"><div className="form-section-title"><Icon name="chef" size={18}/> What's cooking?</div><div className="form-field"><label>Dish Name <span className="req">*</span></label><input placeholder="e.g. Vegetarian Lasagna" value={form.dish_name} onChange={e=>s('dish_name',e.target.value)}/></div><div className="form-field"><label>Photo (optional)</label><div className="photo-upload-area" onClick={()=>fileRef.current.click()}><input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp" onChange={handlePhoto} style={{display:'none'}}/>{preview?<img src={preview} alt="preview" className="photo-preview"/>:<><div style={{fontSize:'2rem',marginBottom:8,color:'var(--text-light)'}}><Icon name="upload" size={32}/></div><p style={{fontWeight:600,color:'var(--text-mid)'}}>Click to upload photo</p><p style={{fontSize:'0.8rem',color:'var(--text-light)',marginTop:4}}>JPEG or PNG</p></>}</div></div><div className="form-field"><label>Description</label><textarea placeholder="Tell neighbors what's in it — key ingredients, spice level, the story behind the dish..." value={form.description} onChange={e=>s('description',e.target.value)}/></div><div className="form-field"><label>Allergens (check all that apply)</label><div className="allergen-grid">{ALLERGENS.map(a=>(<div key={a.id} className={`allergen-check ${form.allergens.includes(a.id)?'checked':''}`} onClick={()=>toggleA(a.id)}><span>{a.emoji}</span>{a.label}{form.allergens.includes(a.id)&&<Icon name="check" size={13}/>}</div>))}</div></div><div className="form-field"><label>Other allergens or dietary notes</label><input placeholder="e.g. Contains garlic, very spicy" value={form.other_allergens} onChange={e=>s('other_allergens',e.target.value)}/></div><div className="form-row"><div className="form-field"><label>Portions available <span className="req">*</span></label><select value={form.portions} onChange={e=>s('portions',parseInt(e.target.value))}><option value={1}>1 portion</option><option value={2}>2 portions</option><option value={3}>3 portions</option></select><span className="form-hint">Keep it to a few portions for safety.</span></div><div className="form-field"><label>Suggested contribution (optional)</label><input type="number" min={0} placeholder="e.g. 8" value={form.contribution} onChange={e=>s('contribution',e.target.value)}/><span className="form-hint">Leave blank if sharing freely.</span></div></div>{form.contribution&&<div className="contribution-notice"><span>💛</span><div style={{fontSize:'0.8rem'}}>Contributions are optional and handled directly via Venmo, Zelle, or PayPal. <strong>No payments are processed on this platform.</strong></div></div>}</div><div className="form-card"><div className="form-section-title"><Icon name="pin" size={18}/> Pickup Details</div><div className="form-field"><label>General address or cross streets</label><input placeholder="e.g. Main St & Oak Ave" value={form.pickup_address} onChange={e=>s('pickup_address',e.target.value)}/></div><div className="form-row"><div className="form-field"><label>ZIP code <span className="req">*</span></label><input placeholder="94040" maxLength={5} value={form.pickup_zip} onChange={e=>s('pickup_zip',e.target.value)}/></div><div className="form-field"><label>Pickup date <span className="req">*</span></label><input type="date" value={form.pickup_date} onChange={e=>s('pickup_date',e.target.value)} min={new Date().toISOString().split('T')[0]}/></div></div><div className="form-row"><div className="form-field"><label>Start time <span className="req">*</span></label><input type="time" value={form.pickup_start} onChange={e=>s('pickup_start',e.target.value)}/></div><div className="form-field"><label>End time <span className="req">*</span></label><input type="time" value={form.pickup_end} onChange={e=>s('pickup_end',e.target.value)}/></div></div></div><div className="form-card"><div className="form-section-title"><Icon name="user" size={18}/> About You</div><div className="form-field"><label>Your name <span className="req">*</span></label><input value={form.cook_name} onChange={e=>s('cook_name',e.target.value)}/></div><div className="form-row"><div className="form-field"><label>Email <span className="req">*</span></label><input type="email" value={form.cook_email} onChange={e=>s('cook_email',e.target.value)}/></div><div className="form-field"><label>Phone <span className="req">*</span></label><input value={form.cook_phone} onChange={e=>s('cook_phone',e.target.value)}/></div></div><div className="privacy-notice" style={{margin:'12px 0 0'}}><Icon name="info" size={16}/><span style={{fontSize:'0.8rem'}}>Food shared through Kitchen Next Door is prepared in home kitchens not inspected by public health authorities. This is a neighbor-to-neighbor sharing initiative, not a food business. All participation is voluntary.</span></div></div>{error&&<p className="error-msg" style={{marginBottom:8}}>{error}</p>}<button className="btn-submit" disabled={loading} onClick={submit}>{loading?'Posting...':<><span>Post Meal for Neighbors</span><Icon name="arrow" size={18}/></>}</button></div>);}

function BrowsePage({currentUser,onRequireAuth,onNavigate}){const[meals,setMeals]=useState([]);const[loading,setLoading]=useState(true);const[claimMeal,setClaimMeal]=useState(null);const[filterZip,setFilterZip]=useState('');const[activeZip,setActiveZip]=useState('');const[sortBy,setSortBy]=useState('newest');const[toast,setToast]=useState('');const load=useCallback(async()=>{setLoading(true);const{data}=await sb.from('meals').select('*').order('created_at',{ascending:false});setLoading(false);if(data)setMeals(data);},[]);useEffect(()=>{load();},[load]);const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(''),3500);};let shown=[...meals];if(activeZip){const exact=shown.filter(m=>m.pickup_zip===activeZip);shown=exact.length>0?exact:shown.filter(m=>m.pickup_zip?.slice(0,3)===activeZip.slice(0,3));}if(sortBy==='newest')shown.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));if(sortBy==='pickup')shown.sort((a,b)=>new Date(a.pickup_date)-new Date(b.pickup_date));const available=shown.filter(m=>(m.portions_claimed||0)<m.portions);const full=shown.filter(m=>(m.portions_claimed||0)>=m.portions);const sorted=[...available,...full];return(<div className="browse-container"><div className="hero"><span className="hero-eyebrow">🏠 Hyperlocal · Homemade · Free or Pay-it-forward</span><h1>Good food is meant<br/>to be <em>shared.</em></h1><p>Connect with neighbors through home-cooked meals. Have extra portions? Share them. Need a warm dinner? Claim one nearby.</p><div className="hero-cta"><button className="btn-terracotta" onClick={()=>{if(!currentUser){onRequireAuth();}else{window.dispatchEvent(new CustomEvent('navigate',{detail:'share'}));}}}><Icon name="chef" size={18}/> Share a Meal</button><button className="btn-outline-forest" onClick={()=>document.querySelector('.browse-header')?.scrollIntoView({behavior:'smooth'})}>See what's cooking ↓</button><button className="btn-outline-sage" onClick={()=>onNavigate('hiw')}>Curious about how this works?</button></div></div><div className="browse-header"><h2>Available Nearby</h2><p>Fresh portions waiting to be claimed in your neighborhood.</p></div><div className="browse-controls"><div className="control-group"><label>Find meals near ZIP</label><div className="zip-group"><input placeholder="Enter ZIP code" maxLength={5} value={filterZip} onChange={e=>setFilterZip(e.target.value)} onKeyDown={e=>e.key==='Enter'&&setActiveZip(filterZip)} style={{width:140}}/><button className="btn-find" onClick={()=>setActiveZip(filterZip)}>Find Nearby</button>{activeZip&&<button className="btn-find" style={{background:'var(--text-light)'}} onClick={()=>{setActiveZip('');setFilterZip('');}}>Clear</button>}</div></div><div className="control-group"><label>Sort by</label><select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{width:160}}><option value="newest">Newest first</option><option value="pickup">Pickup date</option></select></div></div>{loading?<div className="loading">🍽️ Loading meals...</div>:sorted.length===0?(<div className="empty-state"><div className="empty-state-icon">🍽️</div><h3>{activeZip?`No meals near ${activeZip} yet`:'No meals posted yet'}</h3><p>{activeZip?'Try a nearby ZIP or check back later.':'Be the first to share a meal with your neighborhood!'}</p></div>):(<>{available.length>0&&full.length>0&&<p className="section-label">Available Now ({available.length})</p>}<div className="meals-grid">{sorted.map(m=><MealCard key={m.id} meal={m} onClaim={m=>{if(!m){onRequireAuth();return;}setClaimMeal(m);}} currentUser={currentUser}/>)}</div></>)}{claimMeal&&<ClaimModal meal={claimMeal} currentUser={currentUser} onClose={()=>setClaimMeal(null)} onClaimed={()=>{load();showToast('Portion claimed! Check the confirmation for contact details.');}}/>}{toast&&<div className="toast">✓ {toast}</div>}</div>);}

function GratitudeWall({currentUser,onRequireAuth}){const[gratitudes,setGratitudes]=useState([]);const[loading,setLoading]=useState(true);const[showModal,setShowModal]=useState(false);const load=async()=>{setLoading(true);const{data}=await sb.from('reviews').select('*').eq('is_visible',true).order('created_at',{ascending:false});setLoading(false);if(data)setGratitudes(data);};useEffect(()=>{load();},[]);return(<div className="gratitude-container"><div className="gratitude-header"><div className="gratitude-icon">💌</div><h2>The Gratitude Wall</h2><p>A public space to say thank you to the wonderful neighbors who have shared their tables and their time.</p><button className="btn-gratitude" onClick={()=>{if(!currentUser){onRequireAuth();}else{setShowModal(true);}}}><Icon name="heart" size={16}/> Leave a Thank You Note</button></div>{loading?<div className="loading">Loading gratitude notes...</div>:gratitudes.length===0?(<div className="empty-state"><div className="empty-state-icon">💛</div><h3>No notes yet</h3><p>Be the first to thank a neighbor for their kindness.</p></div>):(<div className="gratitude-grid">{gratitudes.map(g=>(<div key={g.id} className="gratitude-card"><div className="gratitude-quote">"</div><p className="gratitude-msg">{g.message}</p><div className="gratitude-footer"><div className="gratitude-names">To: <strong>{g.cook_name}</strong><br/>From: {g.reviewer_name}</div><span className="gratitude-time">{timeAgo(g.created_at)}</span></div></div>))}</div>)}{showModal&&<GratitudeModal currentUser={currentUser} onClose={()=>setShowModal(false)} onPosted={()=>{load();setTimeout(()=>setShowModal(false),2500);}}/>}</div>);}

function App(){const[page,setPage]=useState('browse');const[currentUser,setCurrentUser]=useState(getSession());const[showAuth,setShowAuth]=useState(false);const navigate=(p)=>setPage(p);useEffect(()=>{const h=e=>setPage(e.detail);window.addEventListener('navigate',h);return()=>window.removeEventListener('navigate',h);},[]);return(<><nav><div className="nav-logo" onClick={()=>setPage('browse')}><svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24" style={{color:'var(--terracotta)'}}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Kitchen Next Door</div><div className="nav-links"><button className={`nav-link ${page==='browse'?'active':''}`} onClick={()=>setPage('browse')}>Browse Meals</button><button className={`nav-link ${page==='share'?'active':''}`} onClick={()=>{if(!currentUser){setShowAuth(true);}else{setPage('share');}}}>Share a Meal</button><button className={`nav-link ${page==='hiw'?'active':''}`} onClick={()=>setPage('hiw')}>How it Works</button><button className={`nav-link ${page==='gratitude'?'active':''}`} onClick={()=>setPage('gratitude')}>Gratitude Wall</button></div><div className="nav-auth">{currentUser?(<><div className="user-badge"><div className="avatar">{initials(currentUser.full_name)}</div>{currentUser.full_name?.split(' ')[0]}</div><button className="btn-ghost" onClick={()=>{clearSession();setCurrentUser(null);setPage('browse');}}>Log out</button></>):(<><button className="btn-ghost" onClick={()=>setShowAuth(true)}>Log in</button><button className="btn-primary" onClick={()=>setShowAuth(true)}>Sign up</button></>)}</div></nav>{page==='browse'&&<BrowsePage currentUser={currentUser} onRequireAuth={()=>setShowAuth(true)} onNavigate={navigate}/>}{page==='share'&&<ShareMealPage currentUser={currentUser} onRequireAuth={()=>setShowAuth(true)}/>}{page==='hiw'&&<HowItWorksPage/>}{page==='gratitude'&&<GratitudeWall currentUser={currentUser} onRequireAuth={()=>setShowAuth(true)}/>}{showAuth&&<AuthModal onClose={()=>setShowAuth(false)} onLogin={u=>{setCurrentUser(u);}}/>}</>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
